name: Sync Upstream

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/CuteLeaf/Firefly.git || git remote set-url upstream https://github.com/CuteLeaf/Firefly.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Sync with upstream
        run: |
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "当前分支: $CURRENT_BRANCH"
          
          git checkout $CURRENT_BRANCH
          
          git merge upstream/$CURRENT_BRANCH --no-edit
          
          if [ $? -ne 0 ]; then
            echo "合并过程中出现冲突，正在尝试自动解决..."
            git status
            git diff --name-only --diff-filter=U
            echo "请手动解决冲突后重新运行"
            exit 1
          fi

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet HEAD@{1} HEAD; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git push origin HEAD
          echo "✅ 已成功同步上游更新并推送到远程仓库"

      - name: No changes to push
        if: steps.check_changes.outputs.has_changes == 'false'
        run: echo "ℹ️ 没有发现新的更新，无需推送"

      - name: Create summary
        run: |
          echo "## 🔄 上游同步结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ **状态**: 成功同步并推送更新" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📅 **同步时间**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **状态**: 无新更新" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📅 **检查时间**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          fi
